<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo-primise-1</title>


     <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    
</head>
<body>
    
 <div class="container">
          <div class="row">
            <div class="col-md-6 offset-md-1 mt-4 mb-5">
                 <div class="card">
                    <div class="card-header bg-dark text-center">
                        <h4 class="text-primary"> Todo Management</h4>
                    </div>
                    <form action="" id="todoForm">
                    <div class="card-body">
                            <div class="form-group">
                                <label for="title">Title<span class="text-danger">*</span></label>
                                <input  required type="text" id="title" class="form-control">
                            </div>

                            <div class="form-group">
                                <label for="title">Status<span class="text-danger">*</span></label>
                                <select  required type="text" id="completed" class="form-control">
                                    <option value="true">Complete</option>
                                    <option value="false">Pending</option>
                                    
                                </select>
                            </div>
                        </div>
                        <div class="card-footer bg-dark">
                           <button class="btn btn-block btn-inline-block btn-outline-light" id="addTodo"><i class="fa-solid fa-plus"></i> Add Tod</button>
                           <button class="btn btn-block btn-inline-block btn-outline-light d-none" type="button"  id="updateTodo"><i class="fa-solid fa-plus"></i> Update Todo</button>
                   
                        </div>
                    </form>
                 </div>
            </div>
          </div>
 </div>




<div class="container-fluid">
      <div class="row" >
        <div class="col-md-12">
            <div class="card">
                <div class="card-body">
                    <table class="table table-bordered">
                        <thead class="bg-primary text-light ">
                            <tr >
                                <th>Sr.No</th>
                                <th>Title</th>
                                <th>Status</th>
                                <th>Edit</th>
                                <th>Remove</th>
                                
                            </tr>
                        </thead>
                          <tbody id="todoContainer">
                             <!-- <tr>
                                <td></td>
                                <td></td>
                                <td></td>
                                <td><i class="fa-solid fa-pen-to-square text-primary fa-2x"  onclick="onEdit(this)"></i></td>
                                <td><i class="fa-solid fa-trash text-danger fa-2x"  onclick="onEdit(this)"></i></td>
                             </tr> -->
                          </tbody>
                    </table>
                </div>
            </div>
        </div>
      </div>
</div>


    <div class="spinner d-none" id="spinner">
       <div class="spinner-border text-primary" role="status">
        <span class="sr-only">Loading...</span>
      </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./assets/js/app.js"></script>
</body>
</html>
